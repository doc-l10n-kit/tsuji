tsuji.rag.index-path=l10n/rag/index
tsuji.language.from=en
tsuji.language.to=ja

# Translator Configuration
tsuji.translator.type=gemini

# DeepL Configuration
# tsuji.translator.deepl.api-key=

# Gemini Configuration
# Use Gemini 3.1 Flash Lite Preview for optimal speed, quality, and cost
quarkus.langchain4j.ai.gemini.chat-model.model-id=gemini-3.1-flash-lite-preview

# Gemini batch processing settings
# Maximum number of texts per batch request (default: 10, reduce if seeing size mismatch errors)
tsuji.translator.gemini.batch.max-texts-per-request=50
# Maximum total text size in bytes per batch (default: 50000, ~49 KiB)
tsuji.translator.gemini.batch.max-text-size-bytes=50000

# Adaptive Gemini translation settings
tsuji.translator.gemini.adaptive.enabled=true
tsuji.translator.gemini.adaptive.initial-concurrency=20
tsuji.translator.gemini.adaptive.min-concurrency=1
tsuji.translator.gemini.adaptive.max-concurrency=30
tsuji.translator.gemini.adaptive.max-retries=3

tsuji.jekyll.cname=
tsuji.jekyll.surge-domain-suffix=

quarkus.package.jar.type=uber-jar
quarkus.package.jar.add-runner-suffix=false

# Logging Configuration
# Disable banner for CLI
quarkus.banner.enabled=false

# Root log level: WARN to suppress framework logs
quarkus.log.level=WARN

# Console format
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
quarkus.log.console.stderr=true

# Application logs (net.sharplab) show at INFO level
quarkus.log.category."net.sharplab".level=INFO

quarkus.langchain4j.ai.gemini.log-requests=false
quarkus.langchain4j.ai.gemini.log-responses=false
quarkus.langchain4j.ai.gemini.timeout=60s
