tsuji:
  rag:
    index-path: "l10n/rag/index"
    max-results: 3
    min-score: 0.5

  language:
    from: "en"
    to: "ja"

  translator:
    type: "gemini"

    adaptive:
      # Initial concurrency for parallel requests (default: 40)
      initial-concurrency: 40
      # Minimum concurrency (default: 1)
      min-concurrency: 1
      # Maximum concurrency (default: 60)
      max-concurrency: 60
      # Maximum retry attempts (default: 3)
      max-retries: 3

    deepl:
      # key: ""

    gemini:
      batch:
        # Initial and maximum number of texts per batch request (default: 200)
        # Set both to the same value to disable adaptive batch sizing
        initial-texts-per-request: 200
        max-texts-per-request: 200

    openai:
      # mt-tag: "openai"  # Can be set to "gemini" when using OpenAI-compatible Gemini proxy

      batch:
        initial-texts-per-request: 200
        max-texts-per-request: 200

  jekyll:
    cname: ""
    surge-domain-suffix: ""

# Quarkus configuration
quarkus:
  langchain4j:
    ai:
      gemini:
        chat-model:
          # Set to model's maximum output tokens (no cost penalty, only charges for actual tokens generated)
          max-output-tokens: 65536
          thinking:
            thinking-budget: 0
        timeout: 300s
        log-requests: false
        log-responses: false

    openai:
      chat-model:
        max-completion-tokens: 65536
      timeout: 300s
      log-requests: false
      log-responses: false

  package:
    jar:
      type: uber-jar
      add-runner-suffix: false

  # Disable banner for CLI
  banner:
    enabled: false

  # Logging Configuration
  log:
    # Root log level: WARN to suppress framework logs
    level: WARN
    console:
      format: "%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n"
      stderr: true
    category:
      # Application logs (net.sharplab) show at INFO level
      "net.sharplab":
        level: INFO
