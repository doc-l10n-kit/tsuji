tsuji.rag.index-path=l10n/rag/index
tsuji.language.from=en
tsuji.language.to=ja

# Translator Configuration
tsuji.translator.type=deepl

# DeepL Configuration
# tsuji.translator.deepl.api-key=

tsuji.jekyll.cname=
tsuji.jekyll.surge-domain-suffix=

quarkus.package.jar.type=uber-jar
quarkus.package.jar.add-runner-suffix=false

# Logging Configuration
# Disable banner for CLI
quarkus.banner.enabled=false

# Root log level: INFO to capture detailed logs
quarkus.log.level=INFO

# Console: Only show WARN and above to keep CLI output clean
# For detailed logs (including INFO), refer to the log file (see below)
quarkus.log.console.level=WARN
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
quarkus.log.console.stderr=true

# File: Log everything to file for debugging
# To see detailed logs including translation progress, refer to: log/tsuji.log
# Note: quarkus.log.file.enable is deprecated in Quarkus 3.x but still functional
quarkus.log.file.enable=true
quarkus.log.file.path=log/tsuji.log
quarkus.log.file.level=INFO
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=5

quarkus.langchain4j.ai.gemini.log-requests=false
quarkus.langchain4j.ai.gemini.log-responses=false
quarkus.langchain4j.ai.gemini.timeout=60s
