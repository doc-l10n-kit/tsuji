tsuji.rag.index-path=l10n/rag/index
tsuji.language.from=en
tsuji.language.to=ja

# Translator Configuration
tsuji.translator.type=deepl

# DeepL Configuration
# tsuji.translator.deepl.api-key=

tsuji.jekyll.cname=
tsuji.jekyll.surge-domain-suffix=

quarkus.package.jar.type=uber-jar
quarkus.package.jar.add-runner-suffix=false

# Logging Configuration
# Disable banner for CLI
quarkus.banner.enabled=false

# Console: Only show WARN and ERROR (keep stdout clean for CLI output)
quarkus.log.console.level=WARN
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n

# File: Log everything to file for debugging
quarkus.log.handler.file."FILE".enable=true
quarkus.log.handler.file."FILE".path=log/tsuji.log
quarkus.log.handler.file."FILE".level=INFO
quarkus.log.handler.file."FILE".format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.handler.file."FILE".rotation.max-file-size=10M
quarkus.log.handler.file."FILE".rotation.max-backup-index=5

quarkus.langchain4j.ai.gemini.log-requests=false
quarkus.langchain4j.ai.gemini.log-responses=false
quarkus.langchain4j.ai.gemini.timeout=60s
